<svg width="640" height="640" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 원 (딥그린) -->
  <circle cx="200" cy="200" r="194" fill="#0F2318"/>

  <!-- 점선 링 -->
  <circle cx="200" cy="200" r="186" fill="none" stroke="#1D9E75" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- 내부 원 -->
  <circle cx="200" cy="200" r="176" fill="#162E1E"/>

  <!-- 내부 미세 링 -->
  <circle cx="200" cy="200" r="169" fill="none" stroke="#5DCAA5" stroke-width="0.8" opacity="0.22"/>

  <!-- 상단 앰버 도트들 -->
  <circle cx="200" cy="10" r="5.5" fill="#EF9F27"/>
  <circle cx="174" cy="19" r="3.2" fill="#EF9F27" opacity="0.55"/>
  <circle cx="226" cy="19" r="3.2" fill="#EF9F27" opacity="0.55"/>
  <circle cx="152" cy="36" r="2" fill="#EF9F27" opacity="0.28"/>
  <circle cx="248" cy="36" r="2" fill="#EF9F27" opacity="0.28"/>

  <!-- W : 화이트 -->
  <text x="68" y="210" font-size="78" font-weight="800" font-family="'Arial Black', Arial, sans-serif" fill="#FFFFFF" letter-spacing="-2">W</text>

  <!-- 구분 점 1 -->
  <circle cx="148" cy="185" r="6" fill="#EF9F27"/>

  <!-- 2 : 앰버 -->
  <text x="156" y="210" font-size="78" font-weight="800" font-family="'Arial Black', Arial, sans-serif" fill="#EF9F27" letter-spacing="-2">2</text>

  <!-- 구분 점 2 -->
  <circle cx="216" cy="185" r="6" fill="#EF9F27"/>

  <!-- 화살표 라인 -->
  <line x1="242" y1="185" x2="296" y2="133" stroke="#EF9F27" stroke-width="6" stroke-linecap="round"/>

  <!-- O : 민트 -->
  <text x="222" y="210" font-size="78" font-weight="800" font-family="'Arial Black', Arial, sans-serif" fill="#5DCAA5" letter-spacing="-2">O</text>

  <!-- 화살표 헤드 -->
  <path d="M277 129 L299 129 L299 151" fill="none" stroke="#EF9F27" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- SALAD 위 구분선 -->
  <line x1="120" y1="224" x2="300" y2="224" stroke="#5DCAA5" stroke-width="0.8" opacity="0.4"/>

  <!-- SALAD -->
  <text x="200" y="244" font-size="13" font-family="Arial, sans-serif" fill="#5DCAA5" text-anchor="middle" letter-spacing="6" font-weight="500">SALAD</text>

  <!-- 슬로건 상단 라인 -->
  <line x1="60" y1="265" x2="340" y2="265" stroke="#EF9F27" stroke-width="0.8" opacity="0.5"/>

  <!-- 슬로건 -->
  <text x="200" y="286" font-size="14.5" font-family="Arial, sans-serif" fill="#EF9F27" text-anchor="middle" letter-spacing="1.5" font-weight="700">일어나면 이미 준비된 하루</text>

  <!-- 슬로건 하단 라인 -->
  <line x1="60" y1="296" x2="340" y2="296" stroke="#EF9F27" stroke-width="0.8" opacity="0.5"/>

  <!-- 영문 슬로건 -->
  <text x="200" y="316" font-size="9" font-family="Arial, sans-serif" fill="#5F5E5A" text-anchor="middle" letter-spacing="2">wake up to go out</text>
</svg>
